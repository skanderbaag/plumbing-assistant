<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plumbing Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
        #header { background: #16213e; padding: 16px; text-align: center; border-bottom: 2px solid #0f3460; }
        #header h1 { font-size: 20px; color: #e94560; }
        #header p { font-size: 12px; color: #aaa; margin-top: 4px; }
        #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
        .user { background: #0f3460; align-self: flex-end; border-bottom-right-radius: 4px; }
        .assistant { background: #16213e; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #0f3460; }
        .assistant.loading { color: #aaa; font-style: italic; }
        #input-area { padding: 12px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 8px; }
        #user-input { flex: 1; padding: 12px; border-radius: 24px; border: 1px solid #0f3460; background: #1a1a2e; color: #eee; font-size: 15px; outline: none; }
        #send-btn { background: #e94560; color: white; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #send-btn:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="header">
        <h1>🔧 Plumbing Assistant</h1>
        <p>Ohio & International Code · Shop Standards · Best Practices</p>
    </div>
    <div id="messages">
        <div class="message assistant">
            Hey! I'm your plumbing assistant. Ask me about Ohio plumbing code, IPC standards, pipe sizing, fittings, strapping, DWV, water lines, gas — whatever you need on the job.
        </div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask a plumbing question..." />
        <button id="send-btn">↑</button>
    </div>

    <script>
        const API_KEY = 'REPLACE_ME' ;
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        const systemPrompt = `You are an expert plumbing assistant for a small plumbing company in Ohio. 
You have deep knowledge of:
- Ohio Revised Plumbing Code
- International Plumbing Code (IPC)
- DWV (drain, waste, vent) systems
- Water supply lines
- Gas lines
- Pipe sizing, fittings, and materials (PVC, CPVC, copper, PEX, cast iron)
- Hole saw sizing for various pipe ODs
- Proper strapping and support intervals by material
- Best practices for residential and commercial plumbing

Always give practical, job-site-ready answers. Be concise but thorough. 
If code sections are relevant, cite them. 
If you're unsure about a specific local amendment, say so and recommend verifying with the AHJ.`;

        let conversationHistory = [];

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            inputEl.value = '';
            sendBtn.disabled = true;

            addMessage(text, 'user');
            conversationHistory.push({ role: 'user', content: text });

            const loadingEl = addMessage('Thinking...', 'assistant loading');

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-6',
                        max_tokens: 1024,
                        system: systemPrompt,
                        messages: conversationHistory
                    })
                });

                const data = await response.json();
                const reply = data.content[0].text;

                loadingEl.textContent = reply;
                loadingEl.className = 'message assistant';
                conversationHistory.push({ role: 'assistant', content: reply });

            } catch (err) {
                loadingEl.textContent = 'Something went wrong. Check your connection and try again.';
                loadingEl.className = 'message assistant';
            }

            sendBtn.disabled = false;
            inputEl.focus();
        }

        function addMessage(text, className) {
            const el = document.createElement('div');
            el.className = `message ${className}`;
            el.textContent = text;
            messagesEl.appendChild(el);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return el;
        }

        sendBtn.addEventListener('click', sendMessage);
        inputEl.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
